name: Build & Release APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.3'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        run: flutter build apk --release --split-per-abi

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wizmi-apk
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: "Wizmi v1.0.${{ github.run_number }}"
          body: |
            ## Wizmi — On-Demand Fuel Delivery for Egypt

            ### Download
            Pick the APK for your device:
            - **app-arm64-v8a-release.apk** → Most modern Android phones (Samsung Galaxy, etc.)
            - **app-armeabi-v7a-release.apk** → Older Android phones
            - **app-x86_64-release.apk** → Android emulators

            > ⚠️ **Note:** Connect your own Firebase project before using.
            > Replace `android/app/google-services.json` and `lib/firebase_options.dart` with your real Firebase config.

            ### Install on Samsung
            1. Download **app-arm64-v8a-release.apk**
            2. Open it on your phone
            3. Allow "Install from unknown sources" if asked
          files: build/app/outputs/flutter-apk/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
