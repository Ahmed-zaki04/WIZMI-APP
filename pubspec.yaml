name: wizmi
description: On-demand fuel delivery app for Egypt
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.3
  firebase_messaging: ^15.1.3

  # Dialogs
  awesome_dialog: '>=3.2.0 <3.3.0'

  # UI
  cached_network_image: ^3.4.1
  lottie: ^3.1.2
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.2.0+3

  # State
  provider: ^6.1.2

  # Location
  geolocator: ^13.0.1

  # Utils
  intl: ^0.19.0
  shared_preferences: ^2.3.3
  image_picker: ^1.1.2
  uuid: ^4.5.1

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
